<svg viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="900" height="320" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="white" font-size="18" font-weight="bold">DocIngestQA — RAG Ingestion Quality Auditor</text>
  <text x="450" y="48" text-anchor="middle" fill="#94a3b8" font-size="11">11 deterministic checks · pre-indexing only · zero LLM dependency</text>

  <!-- Input Node -->
  <rect x="14" y="68" width="165" height="64" rx="12" fill="#334155" filter="url(#shadow)"/>
  <text x="96" y="88" text-anchor="middle" fill="white" font-size="11" font-weight="bold">chunks.jsonl</text>
  <text x="96" y="103" text-anchor="middle" fill="#94a3b8" font-size="9">+ source_manifest.json</text>
  <text x="96" y="118" text-anchor="middle" fill="#94a3b8" font-size="9">chunk_id · source · page · text</text>

  <!-- Arrow input → engine -->
  <line x1="179" y1="100" x2="210" y2="100" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Engine box -->
  <rect x="212" y="58" width="350" height="145" rx="12" fill="#1d4ed8" filter="url(#shadow)"/>
  <text x="387" y="78" text-anchor="middle" fill="white" font-size="12" font-weight="bold">DocIngestQA Engine</text>

  <!-- v0.1 checks group inside engine -->
  <rect x="224" y="85" width="155" height="106" rx="8" fill="#7c3aed"/>
  <text x="301" y="100" text-anchor="middle" fill="white" font-size="10" font-weight="bold">v0.1 Checks (8)</text>
  <text x="301" y="113" text-anchor="middle" fill="#c4b5fd" font-size="8">input_summary · metadata</text>
  <text x="301" y="124" text-anchor="middle" fill="#c4b5fd" font-size="8">doc_coverage · page_coverage</text>
  <text x="301" y="135" text-anchor="middle" fill="#c4b5fd" font-size="8">chunk_length · ocr_noise</text>
  <text x="301" y="146" text-anchor="middle" fill="#c4b5fd" font-size="8">duplicate_chunks</text>
  <text x="301" y="157" text-anchor="middle" fill="#c4b5fd" font-size="8">source_distribution</text>
  <text x="301" y="181" text-anchor="middle" fill="#c4b5fd" font-size="8">──────────────</text>

  <!-- v0.2 checks group inside engine -->
  <rect x="388" y="85" width="162" height="106" rx="8" fill="#065f46"/>
  <text x="469" y="100" text-anchor="middle" fill="white" font-size="10" font-weight="bold">v0.2 Checks (3)</text>
  <text x="469" y="116" text-anchor="middle" fill="#6ee7b7" font-size="8">chunk_overlap</text>
  <text x="469" y="129" text-anchor="middle" fill="#6ee7b7" font-size="8">encoding_health</text>
  <text x="469" y="142" text-anchor="middle" fill="#6ee7b7" font-size="8">split_quality</text>

  <!-- Engine → output summary -->
  <line x1="562" y1="130" x2="590" y2="130" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Output summary chain -->
  <rect x="592" y="68" width="140" height="38" rx="10" fill="#374151" filter="url(#shadow)"/>
  <text x="662" y="84" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Executive Summary</text>
  <text x="662" y="97" text-anchor="middle" fill="#9ca3af" font-size="8">PASS / WARN / FAIL</text>

  <line x1="662" y1="106" x2="662" y2="118" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="592" y="120" width="140" height="34" rx="10" fill="#374151" filter="url(#shadow)"/>
  <text x="662" y="136" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Issue List</text>
  <text x="662" y="148" text-anchor="middle" fill="#9ca3af" font-size="8">chunk-level evidence</text>

  <line x1="662" y1="154" x2="662" y2="165" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="592" y="167" width="140" height="30" rx="10" fill="#374151" filter="url(#shadow)"/>
  <text x="662" y="185" text-anchor="middle" fill="#d1d5db" font-size="9">JSON · Markdown · HTML</text>

  <!-- Warning note -->
  <rect x="592" y="204" width="294" height="32" rx="8" fill="#78350f" filter="url(#shadow)"/>
  <text x="739" y="218" text-anchor="middle" fill="#fcd34d" font-size="9" font-weight="bold">⚠ Pre-indexing quality only</text>
  <text x="739" y="230" text-anchor="middle" fill="#fde68a" font-size="8">not retrieval relevance · not RAG correctness</text>

  <!-- Bottom bar -->
  <rect x="0" y="258" width="900" height="62" fill="#0f172a" opacity="0.9"/>
  <text x="450" y="278" text-anchor="middle" fill="#38bdf8" font-size="12" font-weight="bold">11 checks · pip install docingestqa · Deterministic · No LLM dependency</text>
  <text x="450" y="298" text-anchor="middle" fill="#64748b" font-size="10">github.com/SidharthKriplani/docingestqa</text>
  <rect x="776" y="283" width="110" height="18" rx="6" fill="#1d4ed8"/>
  <text x="831" y="296" text-anchor="middle" fill="white" font-size="9">PyPI: docingestqa</text>
</svg>
