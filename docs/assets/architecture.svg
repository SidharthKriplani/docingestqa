<svg viewBox="0 0 1100 480" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="480" fill="url(#bg)"/>

  <!-- ── SECTION 1: INPUT ── -->
  <rect x="20" y="60" width="210" height="190" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="125" y="87" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="700" letter-spacing="2">INPUT</text>
  <line x1="40" y1="96" x2="210" y2="96" stroke="#475569" stroke-width="0.8"/>
  <text x="125" y="120" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">chunks.jsonl</text>
  <text x="125" y="140" text-anchor="middle" fill="#94a3b8" font-size="10">chunk_id · source</text>
  <text x="125" y="155" text-anchor="middle" fill="#94a3b8" font-size="10">page_num · text</text>
  <line x1="50" y1="170" x2="200" y2="170" stroke="#475569" stroke-width="0.5" opacity="0.4"/>
  <text x="125" y="188" text-anchor="middle" fill="#64748b" font-size="10">+ source_manifest.json</text>
  <text x="125" y="202" text-anchor="middle" fill="#64748b" font-size="9">expected sources + page counts</text>
  <text x="125" y="216" text-anchor="middle" fill="#64748b" font-size="9">(optional but recommended)</text>
  <text x="125" y="234" text-anchor="middle" fill="#475569" font-size="9">Exported segment-level RAG chunks</text>

  <!-- Arrow INPUT → ENGINE -->
  <line x1="230" y1="155" x2="296" y2="155" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── SECTION 2: AUDIT ENGINE ── -->
  <rect x="300" y="25" width="520" height="415" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="560" y="56" text-anchor="middle" fill="#60a5fa" font-size="16" font-weight="700">DocIngestQA Engine</text>
  <line x1="320" y1="66" x2="800" y2="66" stroke="#3b82f6" stroke-width="0.8" opacity="0.4"/>
  <text x="560" y="84" text-anchor="middle" fill="#475569" font-size="10">11 deterministic checks · no LLM dependency</text>

  <!-- v0.1 Checks sub-box -->
  <rect x="320" y="96" width="240" height="230" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.4"/>
  <text x="440" y="118" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="700">v0.1 Checks</text>
  <text x="440" y="134" text-anchor="middle" fill="#475569" font-size="9">(8 checks — core QA)</text>
  <line x1="335" y1="140" x2="545" y2="140" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>

  <rect x="335" y="148" width="210" height="22" rx="3" fill="#1e293b"/>
  <text x="440" y="163" text-anchor="middle" fill="#94a3b8" font-size="10">input_summary</text>
  <rect x="335" y="175" width="210" height="22" rx="3" fill="#1e293b"/>
  <text x="440" y="190" text-anchor="middle" fill="#94a3b8" font-size="10">metadata_completeness</text>
  <rect x="335" y="202" width="210" height="22" rx="3" fill="#1e293b"/>
  <text x="440" y="217" text-anchor="middle" fill="#94a3b8" font-size="10">document_coverage</text>
  <rect x="335" y="229" width="210" height="22" rx="3" fill="#1e293b"/>
  <text x="440" y="244" text-anchor="middle" fill="#94a3b8" font-size="10">page_coverage</text>
  <rect x="335" y="256" width="210" height="22" rx="3" fill="#1e293b"/>
  <text x="440" y="271" text-anchor="middle" fill="#94a3b8" font-size="10">chunk_length</text>
  <rect x="335" y="283" width="210" height="22" rx="3" fill="#1e293b"/>
  <text x="440" y="298" text-anchor="middle" fill="#94a3b8" font-size="10">ocr_noise</text>
  <rect x="335" y="310" width="100" height="22" rx="3" fill="#1e293b"/>
  <text x="385" y="325" text-anchor="middle" fill="#94a3b8" font-size="10">duplicate_chunks</text>
  <rect x="445" y="310" width="100" height="22" rx="3" fill="#1e293b"/>
  <text x="495" y="325" text-anchor="middle" fill="#94a3b8" font-size="10">source_distribution</text>

  <!-- v0.2 Checks sub-box -->
  <rect x="572" y="96" width="234" height="165" rx="6" fill="#0f172a" stroke="#22c55e" stroke-width="1" stroke-opacity="0.4"/>
  <text x="689" y="118" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700">v0.2 Checks</text>
  <text x="689" y="134" text-anchor="middle" fill="#475569" font-size="9">(3 checks — advanced QA)</text>
  <line x1="587" y1="140" x2="791" y2="140" stroke="#22c55e" stroke-width="0.5" opacity="0.3"/>

  <rect x="587" y="148" width="205" height="32" rx="3" fill="#1e293b"/>
  <text x="689" y="168" text-anchor="middle" fill="#94a3b8" font-size="11">chunk_overlap</text>
  <rect x="587" y="186" width="205" height="32" rx="3" fill="#1e293b"/>
  <text x="689" y="206" text-anchor="middle" fill="#94a3b8" font-size="11">encoding_health</text>
  <rect x="587" y="224" width="205" height="32" rx="3" fill="#1e293b"/>
  <text x="689" y="244" text-anchor="middle" fill="#94a3b8" font-size="11">split_quality</text>

  <!-- Status pills -->
  <rect x="338" y="358" width="72" height="22" rx="11" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="374" y="374" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="700">PASS</text>
  <rect x="422" y="358" width="72" height="22" rx="11" fill="#451a03" stroke="#f59e0b" stroke-width="1"/>
  <text x="458" y="374" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">WARN</text>
  <rect x="506" y="358" width="72" height="22" rx="11" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="542" y="374" text-anchor="middle" fill="#f87171" font-size="10" font-weight="700">FAIL</text>
  <text x="706" y="374" text-anchor="middle" fill="#64748b" font-size="10">chunk-level evidence · severity H/M</text>

  <!-- API label -->
  <text x="560" y="412" text-anchor="middle" fill="#3b82f6" font-size="10" opacity="0.5">audit(chunks_path) → IssueReport · src/docingestqa/checks.py</text>

  <!-- Arrows ENGINE → outputs -->
  <line x1="820" y1="116" x2="878" y2="116" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="820" y1="216" x2="878" y2="216" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="820" y1="316" x2="878" y2="316" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── SECTION 3: OUTPUT ── -->
  <rect x="880" y="82" width="200" height="72" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="980" y="108" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">IssueReport</text>
  <text x="980" y="127" text-anchor="middle" fill="#86efac" font-size="10">PASS · WARN · FAIL</text>
  <text x="980" y="142" text-anchor="middle" fill="#94a3b8" font-size="10">chunk-level evidence</text>

  <rect x="880" y="182" width="200" height="72" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="980" y="208" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">JSON · MD · HTML</text>
  <text x="980" y="228" text-anchor="middle" fill="#94a3b8" font-size="10">Structured + human-readable</text>
  <text x="980" y="243" text-anchor="middle" fill="#94a3b8" font-size="10">machine-naratable output</text>

  <rect x="880" y="282" width="200" height="72" rx="8" fill="#374151" stroke="#6b7280" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="980" y="303" text-anchor="middle" fill="#f1f5f9" font-size="11" font-weight="700">CLI + Python API</text>
  <text x="980" y="322" text-anchor="middle" fill="#94a3b8" font-size="10">python -m docingestqa</text>
  <text x="980" y="338" text-anchor="middle" fill="#94a3b8" font-size="10">audit(chunks_path)</text>

  <!-- ── BOTTOM STATS BAR ── -->
  <rect x="20" y="445" width="1060" height="28" rx="8" fill="#0f172a" filter="url(#shadow)"/>
  <line x1="20" y1="445" x2="1080" y2="445" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>

  <rect x="34" y="452" width="152" height="16" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="110" y="464" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="700">Checks: 11 deterministic</text>

  <rect x="200" y="452" width="126" height="16" rx="8" fill="#2e1065" stroke="#a855f7" stroke-width="1"/>
  <text x="263" y="464" text-anchor="middle" fill="#d8b4fe" font-size="10" font-weight="700">Granularity: Chunk-level</text>

  <rect x="342" y="452" width="176" height="16" rx="8" fill="#422006" stroke="#eab308" stroke-width="1"/>
  <text x="430" y="464" text-anchor="middle" fill="#fde047" font-size="10" font-weight="700">OCR Detection: Regex+threshold</text>

  <rect x="534" y="452" width="118" height="16" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="593" y="464" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="700">PRD Status: PASS</text>

  <text x="880" y="463" text-anchor="middle" fill="#475569" font-size="9">github.com/SidharthKriplani/docingestqa</text>
</svg>
