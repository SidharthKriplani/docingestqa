<svg viewBox="0 0 1100 520" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="520" fill="url(#bg)"/>

  <!-- ── SECTION 1: INPUT ── -->
  <rect x="20" y="70" width="210" height="200" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="125" y="97" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="700" letter-spacing="2">INPUT</text>
  <line x1="40" y1="106" x2="210" y2="106" stroke="#475569" stroke-width="0.8"/>
  <text x="125" y="130" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">chunks.jsonl</text>
  <text x="125" y="150" text-anchor="middle" fill="#94a3b8" font-size="10">Exported segment-level chunks</text>
  <text x="125" y="166" text-anchor="middle" fill="#94a3b8" font-size="10">chunk_id · source · page · text</text>
  <line x1="45" y1="180" x2="205" y2="180" stroke="#475569" stroke-width="0.5" opacity="0.4"/>
  <text x="125" y="198" text-anchor="middle" fill="#64748b" font-size="10">Accepts any RAG chunking output</text>
  <text x="125" y="216" text-anchor="middle" fill="#64748b" font-size="9">+ optional source_manifest.json</text>
  <text x="125" y="232" text-anchor="middle" fill="#64748b" font-size="9">expected sources + page counts</text>
  <text x="125" y="252" text-anchor="middle" fill="#475569" font-size="9">(optional but recommended)</text>

  <!-- Arrow INPUT → ENGINE -->
  <line x1="230" y1="170" x2="296" y2="170" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── SECTION 2: ENGINE (DARK BLUE) ── -->
  <rect x="300" y="25" width="516" height="440" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="558" y="57" text-anchor="middle" fill="#60a5fa" font-size="16" font-weight="700">DocIngestQA Engine</text>
  <line x1="320" y1="67" x2="796" y2="67" stroke="#3b82f6" stroke-width="0.8" opacity="0.4"/>
  <text x="558" y="85" text-anchor="middle" fill="#93c5fd" font-size="10">11 deterministic checks · no LLM dependency</text>

  <!-- v0.1 Checks sub-section label -->
  <text x="438" y="108" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="700">v0.1 Checks (8)</text>
  <line x1="320" y1="115" x2="556" y2="115" stroke="#3b82f6" stroke-width="0.6" opacity="0.4"/>

  <!-- v0.1 pills: 2 cols x 4 rows -->
  <rect x="320" y="122" width="113" height="26" rx="4" fill="#0f172a" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5"/>
  <text x="376" y="139" text-anchor="middle" fill="#94a3b8" font-size="10">input_summary</text>

  <rect x="443" y="122" width="113" height="26" rx="4" fill="#0f172a" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5"/>
  <text x="499" y="139" text-anchor="middle" fill="#94a3b8" font-size="10">metadata_completeness</text>

  <rect x="320" y="154" width="113" height="26" rx="4" fill="#0f172a" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5"/>
  <text x="376" y="171" text-anchor="middle" fill="#94a3b8" font-size="10">document_coverage</text>

  <rect x="443" y="154" width="113" height="26" rx="4" fill="#0f172a" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5"/>
  <text x="499" y="171" text-anchor="middle" fill="#94a3b8" font-size="10">page_coverage</text>

  <rect x="320" y="186" width="113" height="26" rx="4" fill="#0f172a" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5"/>
  <text x="376" y="203" text-anchor="middle" fill="#94a3b8" font-size="10">chunk_length</text>

  <rect x="443" y="186" width="113" height="26" rx="4" fill="#0f172a" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5"/>
  <text x="499" y="203" text-anchor="middle" fill="#94a3b8" font-size="10">ocr_noise</text>

  <rect x="320" y="218" width="113" height="26" rx="4" fill="#0f172a" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5"/>
  <text x="376" y="235" text-anchor="middle" fill="#94a3b8" font-size="10">duplicate_chunks</text>

  <rect x="443" y="218" width="113" height="26" rx="4" fill="#0f172a" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5"/>
  <text x="499" y="235" text-anchor="middle" fill="#94a3b8" font-size="10">source_distribution</text>

  <!-- v0.2 Checks sub-section label -->
  <text x="684" y="108" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700">v0.2 Checks (3)</text>
  <line x1="558" y1="115" x2="796" y2="115" stroke="#22c55e" stroke-width="0.6" opacity="0.4"/>

  <!-- v0.2 pills -->
  <rect x="566" y="122" width="220" height="36" rx="4" fill="#0f172a" stroke="#22c55e" stroke-width="1" stroke-opacity="0.5"/>
  <text x="676" y="145" text-anchor="middle" fill="#94a3b8" font-size="11">chunk_overlap</text>

  <rect x="566" y="164" width="220" height="36" rx="4" fill="#0f172a" stroke="#22c55e" stroke-width="1" stroke-opacity="0.5"/>
  <text x="676" y="187" text-anchor="middle" fill="#94a3b8" font-size="11">encoding_health</text>

  <rect x="566" y="206" width="220" height="36" rx="4" fill="#0f172a" stroke="#22c55e" stroke-width="1" stroke-opacity="0.5"/>
  <text x="676" y="229" text-anchor="middle" fill="#94a3b8" font-size="11">split_quality</text>

  <!-- Config strip -->
  <rect x="330" y="262" width="446" height="28" rx="6" fill="#0f172a" opacity="0.8"/>
  <text x="553" y="281" text-anchor="middle" fill="#60a5fa" font-size="10">No LLM dependency · deterministic regex + hash · zero false negatives by design</text>

  <!-- Status pills -->
  <rect x="340" y="308" width="72" height="24" rx="12" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="376" y="325" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="700">PASS</text>
  <rect x="424" y="308" width="72" height="24" rx="12" fill="#451a03" stroke="#f59e0b" stroke-width="1"/>
  <text x="460" y="325" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">WARN</text>
  <rect x="508" y="308" width="72" height="24" rx="12" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="544" y="325" text-anchor="middle" fill="#f87171" font-size="10" font-weight="700">FAIL</text>
  <text x="706" y="325" text-anchor="middle" fill="#64748b" font-size="10">chunk-level evidence · severity H/M</text>

  <!-- API label -->
  <text x="558" y="365" text-anchor="middle" fill="#3b82f6" font-size="10" opacity="0.5">audit(chunks_path) → IssueReport · src/docingestqa/checks.py</text>

  <!-- Arrows ENGINE → outputs -->
  <line x1="816" y1="125" x2="876" y2="125" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="816" y1="225" x2="876" y2="225" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="816" y1="315" x2="876" y2="315" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── SECTION 3: OUTPUT ── -->
  <!-- IssueReport: dark green -->
  <rect x="878" y="90" width="202" height="80" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="979" y="118" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">IssueReport</text>
  <text x="979" y="136" text-anchor="middle" fill="#86efac" font-size="10">PASS · WARN · FAIL per check</text>
  <text x="979" y="151" text-anchor="middle" fill="#94a3b8" font-size="10">chunk-level evidence</text>
  <text x="979" y="164" text-anchor="middle" fill="#94a3b8" font-size="9">issue count + severity</text>

  <!-- JSON/MD/HTML: dark blue -->
  <rect x="878" y="188" width="202" height="80" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="979" y="214" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="700">JSON · Markdown · HTML</text>
  <text x="979" y="233" text-anchor="middle" fill="#94a3b8" font-size="10">chunk IDs · page refs</text>
  <text x="979" y="248" text-anchor="middle" fill="#94a3b8" font-size="10">source attribution</text>
  <text x="979" y="262" text-anchor="middle" fill="#94a3b8" font-size="9">machine-readable</text>

  <!-- CLI API: dark gray -->
  <rect x="878" y="286" width="202" height="80" rx="8" fill="#374151" stroke="#6b7280" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="979" y="310" text-anchor="middle" fill="#f1f5f9" font-size="11" font-weight="700">CLI + Python API</text>
  <text x="979" y="330" text-anchor="middle" fill="#94a3b8" font-size="10">python -m docingestqa</text>
  <text x="979" y="347" text-anchor="middle" fill="#94a3b8" font-size="10">audit(chunks_path)</text>
  <text x="979" y="360" text-anchor="middle" fill="#64748b" font-size="9">AuditReport object</text>

  <!-- ── BOTTOM STATS BAR ── -->
  <rect x="20" y="482" width="1060" height="28" rx="8" fill="#0f172a" filter="url(#shadow)"/>
  <line x1="20" y1="482" x2="1080" y2="482" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>

  <rect x="28" y="489" width="148" height="16" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="102" y="501" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="700">Checks: 11 deterministic</text>

  <rect x="184" y="489" width="100" height="16" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="234" y="501" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="700">v0.1: 8 checks</text>

  <rect x="292" y="489" width="100" height="16" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="342" y="501" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="700">v0.2: 3 checks</text>

  <rect x="400" y="489" width="120" height="16" rx="8" fill="#422006" stroke="#eab308" stroke-width="1"/>
  <text x="460" y="501" text-anchor="middle" fill="#fde047" font-size="9" font-weight="700">LLM Required: None</text>

  <rect x="528" y="489" width="116" height="16" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="586" y="501" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="700">PRD Status: PASS</text>

  <text x="840" y="501" text-anchor="middle" fill="#475569" font-size="9">github.com/SidharthKriplani/docingestqa</text>
</svg>
